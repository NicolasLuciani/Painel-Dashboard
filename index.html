<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>Painel Dashboard</title>
</head>
<body>
    <div class="barra_lateral">
        <div class="painel">
            <div class="edustock">
                <div class="icon_main">
                    <i class="bi bi-archive"></i>
                </div>
                <span><b>EduStock</b></span>
            </div>
            <div class="botoes">
                <button><i class="bi bi-columns-gap"></i> Painel</button>
                <button><i class="bi bi-inbox-fill"></i> Inventário</button>
                <button><i class="bi bi-bar-chart"></i> Relatórios</button>
                <button><i class="bi bi-gear"></i> Configurações</button>
            </div>
        </div>
        <div class="suporte">
            <p class="suporte-p">SUPORTE</p>
            <p><i class="bi bi-question-circle"></i> Central de Ajuda</p>
        </div>
    </div>



    <div class="main">
        <header>
            <div class="header_p_c">
                <div class="pesquisa_icon">
                    <i class="bi bi-search"></i>
                    <input class="pesquisa" type="search" placeholder="Pesquiar Inventário...">
                </div>

                <div>
                    <i class="bi bi-bell"></i>
                </div>
                
            </div>


            <div class="conta">
                <div class="text_perfil">
                    <span class="adm"><b>Administrador</b></span>
                    <span class="aca">Academia Santa Maria</span>
                </div>

                <div>
                    <img src="assets/conta.jpg" alt="">
                </div>
                
            </div>
            
        </header>
    </div>
</body>
</html>
